name: Terraform Plan Only
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: 1.10.5
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  environment: ${{ github.event.inputs.environment }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    permissions:
      contents: read
      id-token: write

    outputs:
      plan-output: ${{ steps.plan.outputs.stdout }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          PROJECT_ID: ${{ env.PROJECT_ID }}

      - name: Initialize Terraform
        run: terraform init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=terraform/state/${{ env.environment }}"
        working-directory: ./

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environment/${{ env.environment }}/terraform.tfvars" \
            -out=tfplan.binary \
        working-directory: ./
        continue-on-error: true

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.environment }}
          path: tfplan.binary
          retention-days: 7