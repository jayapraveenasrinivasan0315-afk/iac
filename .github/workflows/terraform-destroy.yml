name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      target:
        description: 'Target resource to destroy'
        required: true
        type: choice
        options:
          - all
          - buckets
          - cloud_run

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}  # ← manual approval via environment protection rule
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true        # ← fixes getAccessToken error
          export_environment_variables: true   # ← fixes getAccessToken error

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/dev"
        working-directory: ./
      - name: Terraform Destroy (all)
        if: ${{ github.event.inputs.target == 'all' }}
        run: |
          terraform destroy \
            -var-file="environment/dev/terraform.tfvars" \
            -auto-approve
        working-directory: ./