name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      plan_run_number:
        description: 'Run number of the terraform-plan workflow (optional: uses latest if not specified)'
        required: false
        type: string

env:
  TF_VERSION: '1.10.5'
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

permissions:
  contents: read
  id-token: write
  actions: read  # Required to download artifacts from other workflow runs

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '3600s'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable Required GCP APIs
        run: |
          gcloud services enable \
            compute.googleapis.com \
            run.googleapis.com \
            storage.googleapis.com \
            iam.googleapis.com \
            vpcaccess.googleapis.com \
            secretmanager.googleapis.com

      - name: Grant Service Account Permissions
        run: |
          GITHUB_SA="github-action-cicdsa-482@gwx-devops-internship.iam.gserviceaccount.com"
          CLOUD_RUN_SA="cloud-run-backend@gwx-devops-internship.iam.gserviceaccount.com"
          PROJECT="gwx-devops-internship"
          
          # Grant GitHub Actions SA permissions
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/artifactregistry.admin" \
            --condition=None || true
          
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/artifactregistry.reader" \
            --condition=None || true
          
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/run.admin" \
            --condition=None || true
          
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --condition=None || true
          
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/iam.serviceAccountUser" \
            --condition=None || true
          
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$GITHUB_SA" \
            --role="roles/storage.admin" \
            --condition=None || true
          
          # Grant Cloud Run SA permissions (to pull images at runtime)
          gcloud projects add-iam-policy-binding $PROJECT \
            --member="serviceAccount:$CLOUD_RUN_SA" \
            --role="roles/artifactregistry.reader" \
            --condition=None || true

      - name: Initialize Terraform
        id: init
        env:
          TF_STATE_BUCKET: ${{ secrets.GCP_TF_STATE_BUCKET }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment }}" \
            -input=false
        working-directory: ./

      - name: Validate Terraform
        run: terraform validate
        working-directory: ./

      - name: Import Existing Resources
        run: |
          # Import the service account if it exists (gracefully handle if not)
          terraform import -allow-missing-config \
            'module.cloud_run.google_service_account.cloud_run_sa' \
            'projects/gwx-devops-internship/serviceAccounts/cloud-run-backend@gwx-devops-internship.iam.gserviceaccount.com' \
            || true
        working-directory: ./
        continue-on-error: true

      - name: Format Check
        run: terraform fmt -check -recursive
        working-directory: ./
        continue-on-error: true

      - name: Download Plan Artifact
        id: download_plan
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: terraform-plan.yml
          run_number: ${{ github.event.inputs.plan_run_number }}
          name: terraform-plan-${{ github.event.inputs.environment }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          search_artifacts: true

      - name: Show Plan
        run: |
          # Display the binary plan format
          terraform show tfplan.binary > plan-output.txt
          echo "## Plan to be Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: ./

      - name: Comment PR with Plan
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('plan-output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Plan output not available';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan for ${{ github.event.inputs.environment }}\n\`\`\`\n${planOutput.substring(0, 65000)}\n\`\`\``
            });

      - name: Apply Terraform
        id: apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan.binary
        working-directory: ./

      - name: Export Terraform Outputs
        if: success()
        run: |
          terraform output -json > terraform-outputs.json
        working-directory: ./

      - name: Upload Outputs Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ github.event.inputs.environment }}
          path: terraform-outputs.json
          retention-days: 30

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plan Run Number:** ${{ github.event.inputs.plan_run_number || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Init:** ${{ steps.init.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Download Plan:** ${{ steps.download_plan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Apply:** ${{ steps.apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "✅ **Infrastructure successfully applied to ${{ github.event.inputs.environment }}!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Apply failed. Check logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi

     